services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ragnify
      POSTGRES_PASSWORD: ragnify
      POSTGRES_DB: ragnify
    volumes:
      - db_data:/var/lib/postgresql/data
      # Runs automatically on first boot (empty data dir) — no manual
      # migration step needed.
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragnify"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # Uncomment to use an NVIDIA GPU (requires the nvidia-container-toolkit
    # installed on the host). Runs fine on CPU without this, just slower.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # These override whatever is in backend/.env so the backend always
      # reaches the other containers by their service name on the compose
      # network, regardless of what you've set for local (non-Docker) dev.
      DATABASE_URL: postgresql://ragnify:ragnify@db:5432/ragnify
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  db_data:
  ollama_data:
