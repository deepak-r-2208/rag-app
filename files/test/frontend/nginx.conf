server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: fall back to index.html for any path that isn't a
    # real file, so a browser refresh on a client-side route still works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
